<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="600" fill="white"/>

  <!-- ===== LEFT: FIELDS (diverse, evolving) ===== -->

  <!-- Container -->
  <rect x="40" y="30" width="320" height="540" rx="20" ry="20" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Label badge -->
  <rect x="100" y="15" width="200" height="32" rx="8" fill="#333"/>
  <text x="200" y="37" text-anchor="middle" fill="white" font-size="15" font-weight="bold">scholarly fields</text>

  <!-- Field cluster 1: physics → splits into "quantum info" and "condensed matter" -->
  <g transform="translate(70, 75)">
    <!-- parent node -->
    <circle cx="30" cy="30" r="18" fill="#7C3AED" stroke="black" stroke-width="1.5"/>
    <text x="30" y="35" text-anchor="middle" fill="white" font-size="10" font-weight="bold">P</text>
    <!-- split arrows -->
    <line x1="48" y1="22" x2="100" y2="10" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="48" y1="38" x2="100" y2="55" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- child nodes -->
    <circle cx="118" cy="10" r="14" fill="#3B82F6" stroke="black" stroke-width="1.5"/>
    <text x="118" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">QI</text>
    <circle cx="118" cy="55" r="14" fill="#3B82F6" stroke="black" stroke-width="1.5"/>
    <text x="118" y="59" text-anchor="middle" fill="white" font-size="8" font-weight="bold">CM</text>
    <!-- split label -->
    <text x="160" y="36" font-size="11" fill="#666" font-style="italic">split</text>
  </g>

  <!-- Field cluster 2: bio + CS → merge into "comp bio" -->
  <g transform="translate(70, 215)">
    <!-- two parent nodes -->
    <circle cx="20" cy="15" r="14" fill="#10B981" stroke="black" stroke-width="1.5"/>
    <text x="20" y="19" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Bio</text>
    <circle cx="20" cy="60" r="14" fill="#F59E0B" stroke="black" stroke-width="1.5"/>
    <text x="20" y="64" text-anchor="middle" fill="white" font-size="8" font-weight="bold">CS</text>
    <!-- merge arrows -->
    <line x1="34" y1="22" x2="95" y2="38" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="34" y1="53" x2="95" y2="38" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- merged node -->
    <circle cx="113" cy="38" r="18" fill="#EC4899" stroke="black" stroke-width="1.5"/>
    <text x="113" y="35" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Comp</text>
    <text x="113" y="45" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Bio</text>
    <!-- merge label -->
    <text x="155" y="42" font-size="11" fill="#666" font-style="italic">merge</text>
  </g>

  <!-- Field cluster 3: new field emerging -->
  <g transform="translate(70, 370)">
    <!-- dashed circle = emerging -->
    <circle cx="70" cy="35" r="18" fill="none" stroke="black" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="70" y="32" text-anchor="middle" fill="#333" font-size="8" font-weight="bold">AI</text>
    <text x="70" y="42" text-anchor="middle" fill="#333" font-size="8" font-weight="bold">Safety</text>
    <!-- sparkle / new indicator -->
    <text x="95" y="22" font-size="16">✦</text>
    <!-- label -->
    <text x="130" y="40" font-size="11" fill="#666" font-style="italic">emerge</text>
  </g>

  <!-- Bottom labels -->
  <text x="130" y="555" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Fields evolve</text>

  <!-- ===== CENTER: METADATA SCHEMA ===== -->

  <!-- Container -->
  <rect x="430" y="70" width="320" height="460" rx="20" ry="20" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Label badge -->
  <rect x="490" y="55" width="200" height="32" rx="8" fill="#333"/>
  <text x="590" y="77" text-anchor="middle" fill="white" font-size="15" font-weight="bold">metadata schema</text>

  <!-- Generic graph structure showing typed relationships -->
  <!-- Top layer: entity types -->
  <g transform="translate(460, 110)">
    <!-- entity type nodes -->
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#E5E7EB" stroke="black" stroke-width="1.5"/>
    <text x="40" y="20" text-anchor="middle" font-size="11" font-weight="600">Person</text>

    <rect x="110" y="0" width="80" height="30" rx="6" fill="#E5E7EB" stroke="black" stroke-width="1.5"/>
    <text x="150" y="20" text-anchor="middle" font-size="11" font-weight="600">Work</text>

    <rect x="200" y="0" width="80" height="30" rx="6" fill="#E5E7EB" stroke="black" stroke-width="1.5"/>
    <text x="240" y="20" text-anchor="middle" font-size="11" font-weight="600">Concept</text>
  </g>

  <!-- Middle: relationship web -->
  <g transform="translate(470, 185)">
    <!-- nodes -->
    <circle cx="40" cy="30" r="10" fill="#7C3AED" stroke="black" stroke-width="1.5"/>
    <circle cx="130" cy="10" r="10" fill="#3B82F6" stroke="black" stroke-width="1.5"/>
    <circle cx="220" cy="30" r="10" fill="#10B981" stroke="black" stroke-width="1.5"/>
    <circle cx="80" cy="75" r="10" fill="#F59E0B" stroke="black" stroke-width="1.5"/>
    <circle cx="180" cy="75" r="10" fill="#EC4899" stroke="black" stroke-width="1.5"/>
    <circle cx="130" cy="110" r="10" fill="#6366F1" stroke="black" stroke-width="1.5"/>

    <!-- edges -->
    <line x1="50" y1="27" x2="120" y2="13" stroke="black" stroke-width="1"/>
    <line x1="140" y1="13" x2="210" y2="27" stroke="black" stroke-width="1"/>
    <line x1="43" y1="40" x2="73" y2="68" stroke="black" stroke-width="1"/>
    <line x1="90" y1="75" x2="170" y2="75" stroke="black" stroke-width="1"/>
    <line x1="217" y1="40" x2="187" y2="68" stroke="black" stroke-width="1"/>
    <line x1="130" y1="20" x2="130" y2="100" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="87" y1="82" x2="123" y2="103" stroke="black" stroke-width="1"/>
    <line x1="173" y1="82" x2="137" y2="103" stroke="black" stroke-width="1"/>
  </g>

  <!-- Properties list -->
  <g transform="translate(465, 330)">
    <rect x="0" y="0" width="280" height="105" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
    <!-- property rows -->
    <text x="15" y="22" font-size="12" fill="#333">→ typed entities</text>
    <text x="15" y="42" font-size="12" fill="#333">→ typed relationships</text>
    <text x="15" y="62" font-size="12" fill="#333">→ community-governed vocabulary</text>
    <text x="15" y="82" font-size="12" fill="#333">→ schema can evolve at runtime</text>
    <text x="15" y="100" font-size="11" fill="#999" font-style="italic">   (propose → vote → approve)</text>
  </g>

  <!-- Bottom label -->
  <text x="590" y="555" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Generic + evolvable</text>

  <!-- ===== RIGHT: DISCOVERABILITY ===== -->

  <!-- magnifying glass icon (large) -->
  <g transform="translate(860, 120)">
    <circle cx="50" cy="50" r="40" fill="none" stroke="black" stroke-width="3"/>
    <line x1="78" y1="78" x2="105" y2="105" stroke="black" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Label badge -->
  <rect x="840" y="55" width="200" height="32" rx="8" fill="#333"/>
  <text x="940" y="77" text-anchor="middle" fill="white" font-size="15" font-weight="bold">discoverability</text>

  <!-- Discovery outcomes -->
  <g transform="translate(830, 250)">
    <!-- search -->
    <rect x="0" y="0" width="240" height="45" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="20" y="18" font-size="20">🔍</text>
    <text x="50" y="20" font-size="13" font-weight="600" fill="#333">full-text search</text>
    <text x="50" y="36" font-size="11" fill="#888">across all indexed eprints</text>

    <!-- faceted browsing -->
    <rect x="0" y="60" width="240" height="45" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="20" y="78" font-size="20">📂</text>
    <text x="50" y="80" font-size="13" font-weight="600" fill="#333">faceted browsing</text>
    <text x="50" y="96" font-size="11" fill="#888">by field, method, entity type</text>

    <!-- citation graph -->
    <rect x="0" y="120" width="240" height="45" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="20" y="138" font-size="20">🔗</text>
    <text x="50" y="140" font-size="13" font-weight="600" fill="#333">citation graphs</text>
    <text x="50" y="156" font-size="11" fill="#888">cross-field connections</text>

    <!-- recommendations -->
    <rect x="0" y="180" width="240" height="45" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="20" y="198" font-size="20">✨</text>
    <text x="50" y="200" font-size="13" font-weight="600" fill="#333">recommendations</text>
    <text x="50" y="216" font-size="11" fill="#888">personalized discovery</text>
  </g>

  <!-- Bottom label -->
  <text x="950" y="555" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Rich discovery</text>

  <!-- ===== CONNECTING ARROWS ===== -->

  <!-- Fields → Schema -->
  <line x1="360" y1="300" x2="430" y2="300" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Schema → Discovery -->
  <line x1="750" y1="300" x2="825" y2="300" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ARROW MARKER ===== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
</svg>
