  # ==============================================================================
  # Stage 6: Build Verification
  # ==============================================================================

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests, integration-tests, compliance-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Build summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All packages built successfully." >> $GITHUB_STEP_SUMMARY

  # ==============================================================================
  # Stage 7: Docker Image Build
  # ==============================================================================

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: |
            ${{ steps.meta-api.outputs.tags }}
            chive:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Save Docker image as artifact
        run: docker save chive:ci | gzip > /tmp/chive-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/chive-image.tar.gz
          retention-days: 1

  # ==============================================================================
  # Stage 8: Docker Smoke Test (full stack in containers)
  # ==============================================================================

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          gunzip -c /tmp/chive-image.tar.gz | docker load
          docker tag chive:ci chive:latest

      - name: Start full stack
        run: docker compose -f docker/docker-compose.ci.yml up -d

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for chive-api to be healthy..."
          for i in $(seq 1 60); do
            health=$(docker inspect --format='{{.State.Health.Status}}' chive-api 2>/dev/null || echo "starting")
            if [ "$health" = "healthy" ]; then
              echo "chive-api is healthy after ~$((i * 5))s"
              exit 0
            fi
            if [ "$health" = "unhealthy" ]; then
              echo "chive-api became unhealthy"
              docker logs chive-api --tail 50
              exit 1
            fi
            echo "Attempt $i/60 - status: $health"
            sleep 5
          done
          echo "Timed out waiting for chive-api"
          docker compose -f docker/docker-compose.ci.yml logs
          exit 1

      - name: Smoke test - API health
        run: |
          curl -sf http://localhost:3000/health
          echo ""
          echo "API health check passed"

      - name: Smoke test - ready endpoint
        run: |
          curl -sf http://localhost:3000/ready
          echo ""
          echo "Ready endpoint check passed"

      - name: Smoke test - migration scripts ran
        run: |
          # Verify migrations created tables
          docker exec chive-postgres psql -U chive -d chive_test -c "\dt" | grep -q eprints_index
          echo "Database migrations verified"

      - name: Smoke test - Elasticsearch index exists
        run: |
          docker exec chive-api curl -sf http://elasticsearch:9200/_cat/indices | grep -q eprints
          echo "Elasticsearch index verified"

      - name: Smoke test - Neo4j constraints exist
        run: |
          docker exec chive-neo4j cypher-shell -u neo4j -p chive_test_password \
            "SHOW CONSTRAINTS" --format plain | head -20
          echo "Neo4j setup verified"

      - name: Smoke test - indexer container running
        run: |
          status=$(docker inspect --format='{{.State.Status}}' chive-indexer)
          if [ "$status" != "running" ]; then
            echo "Indexer is not running (status: $status)"
            docker logs chive-indexer --tail 30
            exit 1
          fi
          echo "Indexer container running"

      - name: Show container status
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml ps

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.ci.yml logs --tail 100

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml down -v

      - name: Smoke test summary
        if: always()
        run: |
          echo "## Docker Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verified the production Docker image runs correctly with all services:" >> $GITHUB_STEP_SUMMARY
          echo "- API health endpoint responds" >> $GITHUB_STEP_SUMMARY
          echo "- Ready endpoint responds" >> $GITHUB_STEP_SUMMARY
          echo "- Database migrations complete successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Elasticsearch index created" >> $GITHUB_STEP_SUMMARY
          echo "- Neo4j constraints applied" >> $GITHUB_STEP_SUMMARY
          echo "- Indexer container starts and runs" >> $GITHUB_STEP_SUMMARY

  # ==============================================================================
  # Stage 9: Pre-Deployment Verification (runs scripts and jobs against test stack)
  # ==============================================================================

  pre-deployment-tests:
    name: Pre-Deployment Verification
    runs-on: ubuntu-latest
    needs: [docker-smoke-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chive_test
          POSTGRES_USER: chive
          POSTGRES_PASSWORD: chive_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: chive
      POSTGRES_PASSWORD: chive_test_password
      POSTGRES_DB: chive_test
      DATABASE_URL: postgresql://chive:chive_test_password@localhost:5432/chive_test
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: chive
      PGPASSWORD: chive_test_password
      PGDATABASE: chive_test
      REDIS_URL: redis://localhost:6379
      ELASTICSEARCH_URL: http://localhost:9200
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chive_test_password
      ADMIN_DIDS: did:plc:test-admin-did

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/start-services

      - name: Run database migrations
        run: pnpm db:migrate:up

      - name: Seed test data
        run: pnpm seed:test

      - name: Run pre-deployment tests
        run: pnpm test:pre-deployment

      - name: Pre-deployment summary
        if: always()
        run: |
          echo "## Pre-Deployment Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verified that all scripts, jobs, and services function correctly." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks performed:" >> $GITHUB_STEP_SUMMARY
          echo "- Service health (PostgreSQL, Elasticsearch, Neo4j, Redis)" >> $GITHUB_STEP_SUMMARY
          echo "- Elasticsearch schema and mappings" >> $GITHUB_STEP_SUMMARY
          echo "- Neo4j schema and indexes" >> $GITHUB_STEP_SUMMARY
          echo "- Indexing pipeline with nested field_nodes" >> $GITHUB_STEP_SUMMARY
          echo "- Script execution (reindex, setup)" >> $GITHUB_STEP_SUMMARY
          echo "- Job and worker module imports" >> $GITHUB_STEP_SUMMARY
