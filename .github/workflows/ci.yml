name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CI: true
  FORCE_COLOR: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==============================================================================
  # Stage 1: Static Analysis (parallel, no services needed)
  # ==============================================================================

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm typecheck

  # ==============================================================================
  # Stage 2: Unit Tests (parallel, no services - tests use mocks)
  # ==============================================================================

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests with coverage
        run: pnpm test:unit --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run frontend tests
        run: pnpm --filter @chive/web test

  # ==============================================================================
  # Stage 3: Integration Tests (requires all 4 database services)
  # ==============================================================================

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chive_test
          POSTGRES_USER: chive
          POSTGRES_PASSWORD: chive_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: chive
      POSTGRES_PASSWORD: chive_test_password
      POSTGRES_DB: chive_test
      DATABASE_URL: postgresql://chive:chive_test_password@localhost:5432/chive_test
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: chive
      PGPASSWORD: chive_test_password
      PGDATABASE: chive_test
      REDIS_URL: redis://localhost:6379
      ELASTICSEARCH_URL: http://localhost:9200
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chive_test_password
      ADMIN_DIDS: did:plc:test-admin-did

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/start-services

      - name: Run integration tests
        run: pnpm test:integration

  # ==============================================================================
  # Stage 4: ATProto Compliance Tests (100% pass rate required)
  # ==============================================================================

  compliance-tests:
    name: ATProto Compliance
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chive_test
          POSTGRES_USER: chive
          POSTGRES_PASSWORD: chive_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: chive
      POSTGRES_PASSWORD: chive_test_password
      POSTGRES_DB: chive_test
      DATABASE_URL: postgresql://chive:chive_test_password@localhost:5432/chive_test
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: chive
      PGPASSWORD: chive_test_password
      PGDATABASE: chive_test
      REDIS_URL: redis://localhost:6379
      ELASTICSEARCH_URL: http://localhost:9200
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chive_test_password
      ADMIN_DIDS: did:plc:test-admin-did

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/start-services

      - name: Run compliance tests
        run: pnpm test:compliance

      - name: Compliance summary
        if: always()
        run: |
          echo "## ATProto Compliance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All compliance tests must pass (100% required for ATProto data sovereignty)." >> $GITHUB_STEP_SUMMARY

